<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="CJM Metals — CRM, projects, HR & payroll, finance, and marketing in one place" />
    <title>CJM Metals</title>
    <script>
      // Apply saved theme before paint to avoid a flash. Default: light.
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)wpt-theme=(dark|light)/);
          if (m && m[1] === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          /* stay light */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-background font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
